<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Command Centre</title>
<meta name="theme-color" content="#f3f1ec">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<aside>
  <div class="logo">
    <div class="logo-mark"><div></div><div></div><div></div><div></div></div>
    <div class="logo-text">COMMAND CENTRE<span>Task &amp; workflow control</span></div>
  </div>
  <nav id="bizNav">
    <div class="nav-label">Categories</div>
    <!-- populated by app.js -->
  </nav>
  <button id="showAddCategoryBtn" class="ghost-btn" style="margin:12px 20px 0;">+ Add category</button>
  <div class="add-category" id="addCategoryForm">
    <input type="text" id="newCategoryName" placeholder="e.g. Personal, University, Sport">
    <div class="chip-row" id="colorSwatches"></div>
    <button type="button" id="saveCategoryBtn" class="add-btn" style="width:100%">Add category</button>
  </div>
  <div class="sidebar-foot"><span class="sync-dot"></span> Saved on this device · offline-ready</div>
  <button id="installBtn">Install app</button>
</aside>

<main>
  <div class="topbar">
    <div class="add-task" id="addTaskWizard">
      <div class="step" id="stepTitle">
        <input type="text" id="taskInput" placeholder="Type a task — or tap the mic">
        <div class="mic-btn" id="micBtn" title="Add task by voice">🎤</div>
        <button type="button" id="titleNextBtn" class="add-btn">Next</button>
      </div>
      <div class="step hidden" id="stepBiz">
        <div class="step-label">Which business is this for?</div>
        <div class="chip-row" id="bizChips"></div>
      </div>
      <div class="step hidden" id="stepPriority">
        <div class="step-label">How important is it?</div>
        <div class="chip-row">
          <button type="button" class="chip" data-priority="high">High</button>
          <button type="button" class="chip" data-priority="med">Medium</button>
          <button type="button" class="chip" data-priority="low">Low</button>
        </div>
      </div>
      <div class="step hidden" id="stepDate">
        <div class="step-label">Due date &amp; time (optional)</div>
        <div class="date-row">
          <div class="field">
            <label for="dueDateInput">Date</label>
            <input type="date" id="dueDateInput">
          </div>
          <div class="field">
            <label for="dueTimeInput">Time</label>
            <input type="time" id="dueTimeInput">
          </div>
        </div>

        <button type="button" id="repeatToggleBtn" class="chip">🔁 Make this repeat</button>

        <div class="hidden" id="repeatOptions">
          <div class="step-label">How often?</div>
          <div class="chip-row" id="repeatChips">
            <button type="button" class="chip" data-freq="daily">Daily</button>
            <button type="button" class="chip" data-freq="weekly">Weekly</button>
            <button type="button" class="chip" data-freq="monthly">Monthly</button>
          </div>
          <div class="hidden" id="repeatDuration">
            <div class="step-label">For how long?</div>
            <div class="chip-row">
              <button type="button" class="chip" data-duration="ongoing">Ongoing</button>
              <button type="button" class="chip" data-duration="count">Set an end</button>
            </div>
            <div class="date-row hidden" id="repeatCountFields">
              <div class="field">
                <label for="repeatCount">Number</label>
                <input type="number" id="repeatCount" min="1" value="4">
              </div>
              <div class="field">
                <label for="repeatUnit">Unit</label>
                <select id="repeatUnit">
                  <option value="weeks">Weeks</option>
                  <option value="months">Months</option>
                  <option value="years">Years</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <div class="wizard-actions">
          <button type="button" id="skipDateBtn" class="ghost-btn">Skip date, add task</button>
          <button type="button" id="finishAddBtn" class="add-btn">Add task</button>
        </div>
      </div>
    </div>
  </div>

  <div class="body-split">
    <div class="tasks-col" id="taskCol"></div>

    <div class="day-panel">
      <h3>Today — Time Blocks</h3>
      <div class="schedule" id="schedule"></div>
      <button id="addBlockBtn">+ Add a time block</button>
      <div class="add-block-form" id="addBlockForm">
        <div class="field">
          <label for="blockLabel">What's the block for?</label>
          <input type="text" id="blockLabel" placeholder="e.g. SEO — Riverside Cafe">
        </div>
        <div class="field">
          <label for="blockBiz">Business</label>
          <select id="blockBiz"></select>
        </div>
        <div class="date-row">
          <div class="field">
            <label for="blockStart">Start</label>
            <select id="blockStart"></select>
          </div>
          <div class="field">
            <label for="blockEnd">End</label>
            <select id="blockEnd"></select>
          </div>
        </div>
        <button type="button" id="saveBlockBtn" class="add-btn" style="width:100%">Save block</button>
      </div>

      <h3 id="calMonthLabel" style="margin-top:26px;">Calendar</h3>
      <div class="mini-cal-grid" id="calDow"></div>
      <div class="mini-cal-grid" id="calGrid"></div>
    </div>
  </div>
</main>

<script src="app.js"></script>
</body>
</html>
